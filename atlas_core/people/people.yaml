# Atlas People Registry — Default Seed
#
# This file is the seeded default. Atlas reads from
# `~/.atlas/config/people.yaml` first if it exists; falls back to this
# packaged default. To override locally:
#
#   mkdir -p ~/.atlas/config
#   cp atlas_core/people/people.yaml ~/.atlas/config/people.yaml
#   # edit the local copy
#
# Each entry has:
#   canonical_name: the single name Atlas stores all references under
#   aliases:        list of strings that resolve to canonical_name
#                   (case-insensitive, exact match after lowercasing)
#   type:           employee | external | non_human
#   tier:           1 (closest) → 5 (most distant)
#                   Concentric circles around Rich:
#                     1 = inner-most contact (multiple times daily)
#                     2 = frequent (multiple times weekly)
#                     3 = recurring (weekly-ish)
#                     4 = occasional (monthly-ish)
#                     5 = distant or single-touch
#                   external people get their own tier on the same scale
#   notes:          (optional) free-text disambiguation context
#
# Non-human entries (Claude, Cloud, etc.) get filtered OUT of the
# People namespace entirely — they should never appear as people in
# the belief graph.
#
# When Rich's actual relationships change, just edit this file —
# next ingestion picks up the changes.

people:

