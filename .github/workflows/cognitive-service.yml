name: Cognitive service conformance

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  python-core:
    name: service py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install pytest==9.0.2
      - run: python -m pytest -q tests/service/test_service_core.py

  service-boundary:
    name: service boundary node22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.22.3"
      - run: python -m pip install pytest==9.0.2 ruff==0.15.10
      - run: node --version
      - run: python -m pytest -q tests/service
      - run: python tests/service/performance_service_gate.py --iterations 20
      - run: ruff check integrations/cognitive-service tests/service

  windows-boundary:
    name: service windows py3.14 node22
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.22.3"
      - run: python -m pip install pytest==9.0.2
      - run: node --version
      - run: python -m pytest -q tests/service
