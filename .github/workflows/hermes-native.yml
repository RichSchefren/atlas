name: Hermes native provider

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  pinned-hermes-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: >-
          python -m pip install
          pytest==9.0.2
          pytest-asyncio==1.3.0
          pyyaml==6.0.3
          rich==14.3.3

      - name: Check out pinned Hermes contract fixture
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: NousResearch/hermes-agent
          ref: b5bd0ef38b538627a0e5d2cbe5d3eef2c38ec792
          path: .contract/hermes-agent

      - name: Test real Hermes loader and provider contract
        env:
          HERMES_UPSTREAM: ${{ github.workspace }}/.contract/hermes-agent
        run: python -m pytest -q tests/hermes/test_native_hermes_plugin.py

      - name: Lint native provider package
        run: |
          python -m pip install ruff==0.15.10
          ruff check integrations/hermes-atlas/atlas tests/hermes/test_native_hermes_plugin.py

  windows-pinned-hermes-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install pinned Hermes test dependencies
        run: >-
          python -m pip install
          pytest==9.0.2
          pyyaml==6.0.3
          rich==14.3.3

      - name: Check out pinned Hermes contract fixture
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: NousResearch/hermes-agent
          ref: b5bd0ef38b538627a0e5d2cbe5d3eef2c38ec792
          path: .contract/hermes-agent

      - name: Install with PowerShell and exercise native lifecycle
        shell: pwsh
        run: |
          $env:HERMES_HOME = Join-Path $env:RUNNER_TEMP "atlas-hermes-home"
          $env:HERMES_UPSTREAM = Join-Path $env:GITHUB_WORKSPACE ".contract\hermes-agent"
          .\integrations\hermes-atlas\install.ps1 -NoActivate
          python tests\hermes\windows_native_smoke.py
          python -m pytest -q tests\hermes\test_native_hermes_plugin.py -k "simultaneous_processes_atomically_publish_one_managed_state or state_publisher_crash_cannot_block_or_publish_partial_json"
